<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wedding Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --cream:#fdf8f3; --cream-2:#f9f1e8; --cream-3:#f2e8db;
            --blush-light:#fce8e8; --blush:#f4b8b8; --blush-mid:#e8949c;
            --rose:#d4606a; --rose-deep:#b84550;
            --gold-light:#f7e6b0; --gold:#c9a84c; --gold-dark:#9e7a28;
            --text-dark:#2c1f1f; --text-mid:#6b4f4f; --text-light:#a08080;
            --border:#ecddd0; --border-light:#f4ebe2; --white:#ffffff;
            --green-light:#e4f5ec; --green:#3a9e6b;
            --amber-light:#fff4e0; --amber:#c87f2a;
            --red-light:#fdeaea; --red:#c94545;
            --purple-light:#f0eaff; --purple:#7c55c8;
            --sidebar-w:248px; --header-h:64px;
            --radius-sm:6px; --radius-md:10px; --radius-lg:16px; --radius-xl:22px;
            --shadow-xs:0 1px 3px rgba(44,31,31,.06),0 1px 2px rgba(44,31,31,.04);
            --shadow-sm:0 2px 8px rgba(44,31,31,.08),0 1px 3px rgba(44,31,31,.05);
            --shadow-md:0 6px 20px rgba(44,31,31,.10),0 2px 6px rgba(44,31,31,.06);
            --shadow-lg:0 16px 40px rgba(44,31,31,.14),0 4px 12px rgba(44,31,31,.08);
            --transition:200ms cubic-bezier(.4,0,.2,1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{height:100%;}
        body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);display:flex;overflow:hidden;-webkit-font-smoothing:antialiased;}
        ::-webkit-scrollbar{width:6px;height:6px;}
        ::-webkit-scrollbar-track{background:transparent;}
        ::-webkit-scrollbar-thumb{background:var(--blush);border-radius:99px;}

        /* ── Sidebar ── */
        .sidebar{width:var(--sidebar-w);min-height:100vh;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto;overflow-x:hidden;box-shadow:var(--shadow-sm);}
        .sidebar-header{padding:22px 18px 18px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:10px;flex-shrink:0;}
        .logo-mark{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--rose),var(--blush-mid));border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(212,96,106,.35);}
        .logo-mark svg{width:18px;height:18px;}
        .logo-text{display:flex;flex-direction:column;gap:1px;}
        .logo-text .brand{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--text-dark);line-height:1.1;}
        .logo-text .sub{font-size:9px;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.14em;}
        .sidebar-section-label{font-size:9.5px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.1em;padding:20px 20px 6px;}
        .nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius-md);cursor:pointer;font-size:13.5px;font-weight:450;color:var(--text-mid);transition:background var(--transition),color var(--transition);text-decoration:none;white-space:nowrap;}
        .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.65;transition:opacity var(--transition);}
        .nav-item:hover{background:var(--cream-2);color:var(--text-dark);}
        .nav-item:hover svg{opacity:1;}
        .nav-item.active{background:var(--blush-light);color:var(--rose);font-weight:600;}
        .nav-item.active svg{opacity:1;}
        .nav-badge{margin-left:auto;background:var(--blush-light);color:var(--rose);font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;}
        .sidebar-footer{margin-top:auto;padding:14px 12px;border-top:1px solid var(--border-light);flex-shrink:0;}
        .user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--radius-md);cursor:pointer;transition:background var(--transition);}
        .user-card:hover{background:var(--cream-2);}
        .user-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--blush-mid),var(--rose));color:white;font-weight:700;font-size:12px;}
        .user-info{display:flex;flex-direction:column;gap:1px;overflow:hidden;}
        .user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .user-role{font-size:11px;color:var(--text-light);}

        /* ── Main ── */
        .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
        .topbar{height:var(--header-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0;}
        .breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-light);}
        .breadcrumb .bc-root{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text-mid);}
        .breadcrumb .bc-active{color:var(--text-dark);font-weight:600;}
        .breadcrumb-sep{width:4px;height:4px;background:var(--border);border-radius:50%;flex-shrink:0;}
        .topbar-actions{margin-left:auto;display:flex;align-items:center;gap:8px;}
        .icon-btn{position:relative;width:36px;height:36px;border-radius:var(--radius-md);border:1px solid var(--border);background:#fff;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background var(--transition),border-color var(--transition);}
        .icon-btn:hover{background:var(--cream-2);border-color:var(--blush);}
        .icon-btn svg{width:15px;height:15px;stroke:var(--text-mid);}
        .page-content{padding:28px;overflow-y:auto;height:calc(100vh - var(--header-h));}

        /* ── Buttons ── */
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 16px;border-radius:var(--radius-md);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;border:1px solid var(--border);background:#fff;color:var(--text-dark);cursor:pointer;white-space:nowrap;transition:background var(--transition),border-color var(--transition),color var(--transition),box-shadow var(--transition);text-decoration:none;line-height:1.4;}
        .btn:hover{background:var(--cream-2);border-color:var(--blush);}
        .btn:active{transform:translateY(1px);}
        .btn-primary{background:var(--rose);color:#fff;border-color:var(--rose);box-shadow:0 2px 8px rgba(212,96,106,.30);}
        .btn-primary:hover{background:var(--rose-deep);border-color:var(--rose-deep);}
        .btn-gold{background:var(--gold);color:#fff;border-color:var(--gold);}
        .btn-gold:hover{background:var(--gold-dark);border-color:var(--gold-dark);}
        .btn-ghost{background:transparent;color:var(--text-mid);border-color:transparent;}
        .btn-ghost:hover{background:var(--cream-2);border-color:var(--border);}
        .btn-danger{background:var(--red-light);color:var(--red);border-color:#f5c2c2;}
        .btn-danger:hover{background:#fbd5d5;border-color:var(--red);}
        .btn-sm{padding:5px 10px;font-size:12px;border-radius:var(--radius-sm);}
        .btn-icon{padding:6px;border-radius:var(--radius-sm);}

        /* ── Cards ── */
        .card{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-md);border:1px solid var(--border-light);padding:22px;}
        .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
        .card-header h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--text-dark);}
        .card-header .card-actions{display:flex;gap:8px;align-items:center;}
        h1,h2,h3,h4{margin:0;}
        .muted{color:var(--text-light);font-size:13px;}
        .serif{font-family:'Cormorant Garamond',serif;}

        /* ── Dashboard grid ── */
        .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
        .dash-full{grid-column:1/-1;}

        /* ── Stats ── */
        .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
        .stat-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px 14px;display:flex;flex-direction:column;gap:5px;box-shadow:var(--shadow-xs);}
        .stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;}
        .stat-icon svg{width:15px;height:15px;}
        .stat-label{font-size:10.5px;font-weight:700;color:var(--text-light);text-transform:uppercase;letter-spacing:.07em;}
        .stat-value{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;line-height:1;}
        .stat-sub{font-size:11px;color:var(--text-light);}
        .stat-rose .stat-icon{background:var(--blush-light);}.stat-rose .stat-icon svg{stroke:var(--rose);}.stat-rose .stat-value{color:var(--rose);}
        .stat-gold .stat-icon{background:var(--gold-light);}.stat-gold .stat-icon svg{stroke:var(--gold-dark);}.stat-gold .stat-value{color:var(--gold-dark);}
        .stat-green .stat-icon{background:var(--green-light);}.stat-green .stat-icon svg{stroke:var(--green);}.stat-green .stat-value{color:var(--green);}
        .stat-amber .stat-icon{background:var(--amber-light);}.stat-amber .stat-icon svg{stroke:var(--amber);}.stat-amber .stat-value{color:var(--amber);}
        .stat-purple .stat-icon{background:var(--purple-light);}.stat-purple .stat-icon svg{stroke:var(--purple);}.stat-purple .stat-value{color:var(--purple);}

        /* ── Badges ── */
        .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-weight:600;font-size:11px;line-height:1.6;}
        .badge-dot{width:6px;height:6px;border-radius:50%;}
        .badge-rose{background:var(--blush-light);color:var(--rose-deep);}
        .badge-gold{background:var(--gold-light);color:var(--gold-dark);}
        .badge-success{background:var(--green-light);color:#1e7a4f;}
        .badge-warn{background:var(--amber-light);color:#7a4e10;}
        .badge-danger{background:var(--red-light);color:#8b1f1f;}
        .badge-info{background:#e6f0ff;color:#1a4fa0;}
        .badge-purple{background:var(--purple-light);color:#4a2d9e;}

        /* ── Gold rule ── */
        .gold-rule{width:36px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);border-radius:2px;margin:10px 0 14px;}

        /* ── Table ── */
        .table-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-xl);box-shadow:var(--shadow-xs);overflow:hidden;}
        .table-toolbar{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border-light);flex-wrap:wrap;}
        .search-wrap{position:relative;flex:1;min-width:200px;}
        .search-wrap input{padding-left:32px;background:#fff;}
        .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text-light);}
        .table-wrap{overflow-x:auto;}
        table{width:100%;border-collapse:collapse;font-size:13.5px;}
        thead{background:var(--cream);border-bottom:1px solid var(--border-light);}
        th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-light);white-space:nowrap;cursor:default;}
        th.sortable{cursor:pointer;user-select:none;}
        th.sortable:hover{color:var(--text-dark);}
        .sort-arrow{margin-left:4px;opacity:.5;font-size:10px;}
        .sort-arrow.asc,.sort-arrow.desc{opacity:1;color:var(--rose);}
        td{padding:11px 14px;border-bottom:1px solid var(--border-light);vertical-align:middle;}
        tr:last-child td{border-bottom:none;}
        tr.row-even td{background:var(--cream);}
        tr:hover td{background:var(--blush-light);}
        .td-actions{display:flex;gap:6px;align-items:center;}
        .pagination-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-top:1px solid var(--border-light);font-size:12px;color:var(--text-light);}
        .pag-controls{display:flex;gap:4px;}
        .pag-btn{padding:4px 9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:#fff;font-size:12px;cursor:pointer;}
        .pag-btn:hover:not(:disabled){background:var(--cream-2);}
        .pag-btn.active{background:var(--rose);color:#fff;border-color:var(--rose);}
        .pag-btn:disabled{opacity:.4;cursor:default;}

        /* ── Forms ── */
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .form-group{display:flex;flex-direction:column;gap:5px;}
        .form-label{font-size:11.5px;font-weight:600;color:var(--text-mid);text-transform:uppercase;letter-spacing:.06em;}
        input,select,textarea{width:100%;padding:9px 12px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--cream);font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text-dark);outline:none;transition:border-color var(--transition),background var(--transition);}
        input:focus,select:focus,textarea:focus{border-color:var(--blush-mid);background:#fff;}

        /* ── Info list ── */
        .info-list{display:flex;flex-direction:column;gap:10px;}
        .info-row{display:flex;justify-content:space-between;align-items:center;}
        .info-row .info-label{font-size:12px;color:var(--text-light);font-weight:500;}
        .info-row .info-val{font-size:13.5px;font-weight:600;color:var(--text-dark);}

        /* ── Toast ── */
        .toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--text-dark);color:#fff;padding:12px 20px;border-radius:var(--radius-lg);font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;transform:translateY(10px);opacity:0;transition:transform .25s ease,opacity .25s ease;pointer-events:none;}
        .toast.show{transform:translateY(0);opacity:1;}
        .toast.toast-success{background:var(--green);}
        .toast.toast-danger{background:var(--red);}

        /* ── No data ── */
        .no-data-row td{text-align:center;padding:40px 20px;color:var(--text-light);font-style:italic;}

        /* ── Modal ── */
        .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(44,31,31,.45);z-index:1000;align-items:center;justify-content:center;padding:20px;}
        .modal-backdrop.open{display:flex;}
        .modal{background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:20px 24px 0;}
        .modal-header strong{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;}
        .modal-body{padding:20px 24px;}
        .modal-actions{display:flex;justify-content:flex-end;gap:8px;padding:0 24px 20px;}

        /* ── Seating board ── */
        .seating-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-top:16px;}
        .table-card-seat{background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;transition:box-shadow var(--transition);}
        .table-card-seat:hover{box-shadow:var(--shadow-sm);}
        .table-card-seat .table-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--rose);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
        .table-card-seat .seat-guest{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:13px;}
        .table-card-seat .seat-guest:last-child{border-bottom:none;}
        .table-card-seat .seat-role{font-size:11px;color:var(--text-light);}
        .unassigned-list{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
        .unassigned-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-md);font-size:13px;}

        /* ── Responsive ── */
        @media(max-width:1100px){.stats-row{grid-template-columns:repeat(3,1fr);}}
        @media(max-width:900px){.dash-grid{grid-template-columns:1fr;}.dash-full{grid-column:1;}}
        @media(max-width:768px){.sidebar{width:60px;}.sidebar .logo-text,.sidebar .nav-item span:not(.nav-badge),.sidebar .sidebar-section-label,.sidebar .user-info{display:none;}.main{margin-left:60px;}.stats-row{grid-template-columns:1fr 1fr;}}
        @media(max-width:540px){.page-content{padding:14px;}.modal-body .form-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21.593c-5.63-5.539-11-10.297-11-14.402C1 3.402 4.248 1 7.5 1 9.849 1 11.271 2.007 12 3.011 12.729 2.007 14.151 1 16.5 1 19.752 1 23 3.402 23 7.191c0 4.105-5.37 8.863-11 14.402z"/>
            </svg>
        </div>
        <div class="logo-text">
            <span class="brand">Wedding Planner</span>
            <span class="sub">Plan Your Perfect Day</span>
        </div>
    </div>

    <div class="sidebar-section-label">Main</div>
    <a class="nav-item active" href="#/dashboard" data-page="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
    </a>
    <a class="nav-item" href="#/event" data-page="event">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Events</span>
    </a>
    <a class="nav-item" href="#/guests" data-page="guests">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Guests</span>
        <span class="nav-badge" id="badge-guests">0</span>
    </a>
    <a class="nav-item" href="#/seating" data-page="seating">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
        <span>Seating</span>
    </a>
    <a class="nav-item" href="#/venue" data-page="venue">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Venue</span>
    </a>
    <a class="nav-item" href="#/band" data-page="band">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <span>Band</span>
    </a>
    <a class="nav-item" href="#/photographer" data-page="photographer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Photographer</span>
    </a>
    <a class="nav-item" href="#/church" data-page="church">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="8"/><line x1="9" y1="5" x2="15" y2="5"/><path d="M4 10l8 4 8-4"/><path d="M4 10v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/></svg>
        <span>Church</span>

<script>
// =============================================================
//  CONFIG
// =============================================================
const API = 'http://localhost:3000';

// =============================================================
//  APP STATE  — loaded from DB, not hardcoded
// =============================================================
let CURRENT_USER   = null;
let CURRENT_WEDDING = null;
let EVENTS         = [];
let GUESTS         = [];
let VENUES         = [];
let VENUE_BOOKINGS = [];
let PHOTOGRAPHERS  = [];
let PHOTOGRAPHER_BOOKINGS = [];
let BANDS          = [];
let BAND_BOOKINGS  = [];
let CHURCHES       = [];
let CHURCH_BOOKINGS = [];
let REGISTRARS     = [];
let REGISTRAR_BOOKINGS = [];
let ATTENDANCE     = [];

// =============================================================
//  API HELPER
// =============================================================
async function api(method, path, body) {
    const opts = {
        method,
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' }
    };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API}${path}`, opts);
    if (res.status === 401) { window.location.href = 'login.html'; return null; }
    return res;
}

// =============================================================
//  BOOTSTRAP — check auth + load all data
// =============================================================
async function bootstrap() {
    // 1. Check login
    const meRes = await fetch(`${API}/api/auth/me`, { credentials: 'include' });
    if (!meRes.ok) { window.location.href = 'login.html'; return; }
    CURRENT_USER = (await meRes.json()).user;

    // Update sidebar user info
    document.getElementById('userName').textContent = `${CURRENT_USER.first_name} ${CURRENT_USER.last_name}`;
    document.getElementById('userAvatar').textContent = `${CURRENT_USER.first_name[0]}${CURRENT_USER.last_name[0]}`;

    // 2. Load wedding
    const wRes = await api('GET', '/api/weddings');
    if (wRes && wRes.ok) {
        const weddings = await wRes.json();
        CURRENT_WEDDING = weddings[0] || null;
    }

    if (!CURRENT_WEDDING) {
        // No wedding yet — show create wedding prompt
        if (!location.hash || location.hash === '#/dashboard') {
            renderApp();
            return;
        }
    }

    const wid = CURRENT_WEDDING ? CURRENT_WEDDING.wedding_id : null;

    // 3. Load all data in parallel
    if (wid) {
        const [evR, guR, vbR, pbR, bbR, rbR, cbR, attR] = await Promise.all([
            api('GET', `/api/weddings/${wid}/events`),
            api('GET', `/api/weddings/${wid}/guests`),
            api('GET', `/api/weddings/${wid}/venue-bookings`),
            api('GET', `/api/weddings/${wid}/photographer-bookings`),
            api('GET', `/api/weddings/${wid}/band-bookings`),
            api('GET', `/api/weddings/${wid}/registrar-bookings`),
            api('GET', `/api/weddings/${wid}/church-bookings`),
            api('GET', `/api/weddings/${wid}/attendance`)
        ]);
        if (evR && evR.ok) EVENTS = await evR.json();
        if (guR && guR.ok) GUESTS = await guR.json();
        if (vbR && vbR.ok) VENUE_BOOKINGS = await vbR.json();
        if (pbR && pbR.ok) PHOTOGRAPHER_BOOKINGS = await pbR.json();
        if (bbR && bbR.ok) BAND_BOOKINGS = await bbR.json();
        if (rbR && rbR.ok) REGISTRAR_BOOKINGS = await rbR.json();
        if (cbR && cbR.ok) CHURCH_BOOKINGS = await cbR.json();
        if (attR && attR.ok) ATTENDANCE = await attR.json();
    }

    const [venR, banR, phR, chR, regR] = await Promise.all([
        api('GET', '/api/venues'),
        api('GET', '/api/bands'),
        api('GET', '/api/photographers'),
        api('GET', '/api/churches'),
        api('GET', '/api/registrars')
    ]);
    if (venR && venR.ok) VENUES = await venR.json();
    if (banR && banR.ok) BANDS = await banR.json();
    if (phR && phR.ok) PHOTOGRAPHERS = await phR.json();
    if (chR && chR.ok) CHURCHES = await chR.json();
    if (regR && regR.ok) REGISTRARS = await regR.json();

    renderApp();
}

// Reload all wedding-specific data then re-render
async function reload() {
    if (!CURRENT_WEDDING) return;
    const wid = CURRENT_WEDDING.wedding_id;
    const [evR, guR, vbR, pbR, bbR, rbR, cbR, attR] = await Promise.all([
        api('GET', `/api/weddings/${wid}/events`),
        api('GET', `/api/weddings/${wid}/guests`),
        api('GET', `/api/weddings/${wid}/venue-bookings`),
        api('GET', `/api/weddings/${wid}/photographer-bookings`),
        api('GET', `/api/weddings/${wid}/band-bookings`),
        api('GET', `/api/weddings/${wid}/registrar-bookings`),
        api('GET', `/api/weddings/${wid}/church-bookings`),
        api('GET', `/api/weddings/${wid}/attendance`)
    ]);
    if (evR && evR.ok) EVENTS = await evR.json();
    if (guR && guR.ok) GUESTS = await guR.json();
    if (vbR && vbR.ok) VENUE_BOOKINGS = await vbR.json();
    if (pbR && pbR.ok) PHOTOGRAPHER_BOOKINGS = await pbR.json();
    if (bbR && bbR.ok) BAND_BOOKINGS = await bbR.json();
    if (rbR && rbR.ok) REGISTRAR_BOOKINGS = await rbR.json();
    if (cbR && cbR.ok) CHURCH_BOOKINGS = await cbR.json();
    if (attR && attR.ok) ATTENDANCE = await attR.json();
    renderApp();
}

// =============================================================
//  ROUTER
// =============================================================
const ROUTE_LABELS = {
    '/dashboard':'Dashboard','/event':'Events','/guests':'Guests',
    '/seating':'Table Seating','/venue':'Venue','/band':'Band',
    '/photographer':'Photographer','/church':'Church',
    '/registrar':'Registrar','/settings':'Settings'
};
const ROUTE_RENDERERS = {
    '/dashboard':renderDashboard,'/event':renderEventPage,
    '/guests':renderGuestsPage,'/seating':renderSeatingPage,
    '/venue':renderVenuePage,'/band':renderBandPage,
    '/photographer':renderPhotographerPage,'/church':renderChurchPage,
    '/registrar':renderRegistrarPage,'/settings':renderSettingsPage
};

function navigate(hash){ window.location.hash = hash; }

function renderApp(){
    const rawPath = window.location.hash.replace('#','') || '/dashboard';
    const ctx = rawPath.split('?')[0];
    document.getElementById('breadcrumb-page').textContent = ROUTE_LABELS[ctx] || 'Dashboard';
    document.querySelectorAll('.nav-item').forEach(a => {
        const page = a.getAttribute('data-page');
        a.classList.toggle('active', page ? `/${page}` === ctx : false);
    });
    const content = document.getElementById('page-content');
    content.innerHTML = '';
    (ROUTE_RENDERERS[ctx] || renderDashboard)(content);
    syncBadges();
}

window.addEventListener('hashchange', renderApp);
document.addEventListener('DOMContentLoaded', () => {
    if (!location.hash) location.hash = '#/dashboard';
    bootstrap();
});

function syncBadges(){
    const g = document.getElementById('badge-guests');

document.getElementById('btnLogout').addEventListener('click', async (e) => {

document.getElementById('modalBackdrop').addEventListener('click', e => {
    if(e.target === document.getElementById('modalBackdrop')) closeModal();
});

// =============================================================
//  DATA TABLE BUILDER
// =============================================================
function buildDataTable({ container, columns, rows, onEdit, onDelete }){
    container.innerHTML = '';
    const tableCard = document.createElement('div');
    tableCard.className = 'table-card';

    // toolbar / search
    const toolbar = document.createElement('div');
    toolbar.className = 'table-toolbar';
    const searchWrap = document.createElement('div');
    searchWrap.className = 'search-wrap';
    searchWrap.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-input" placeholder="Search..."/>`;
    toolbar.appendChild(searchWrap);
    tableCard.appendChild(toolbar);

    const tableWrap = document.createElement('div');
    tableWrap.className = 'table-wrap';
    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');

    let sortKey = null, sortDir = 'asc';
    let currentData = [...rows];
    let currentPage = 1;
    const pageSize = 8;

    columns.forEach(col => {
        const th = document.createElement('th');
        if(col.sortable !== false) th.classList.add('sortable');
        th.innerHTML = col.header + (col.sortable !== false ? '<span class="sort-arrow">&#8597;</span>' : '');
        if(col.sortable !== false){
            th.addEventListener('click', () => {
                sortKey = col.accessor;
                sortDir = sortKey === col.accessor && sortDir === 'asc' ? 'desc' : 'asc';
                sortAndRender();
            });
        }
        headRow.appendChild(th);
    });
    const thAct = document.createElement('th');
    thAct.textContent = 'Actions'; thAct.style.textAlign = 'right';
    headRow.appendChild(thAct);
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    tableCard.appendChild(tableWrap);

    const pagBar = document.createElement('div');
    pagBar.className = 'pagination-bar';
    const pagInfo = document.createElement('span');
    const pagCtrls = document.createElement('div');
    pagCtrls.className = 'pag-controls';
    pagBar.appendChild(pagInfo);
    pagBar.appendChild(pagCtrls);
    tableCard.appendChild(pagBar);
    container.appendChild(tableCard);

    function renderRows(){
        tbody.innerHTML = '';
        const total = currentData.length;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        if(currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage-1)*pageSize;
        const slice = currentData.slice(start, start+pageSize);

        pagInfo.textContent = total === 0 ? 'No results' : `${start+1}–${Math.min(start+pageSize,total)} of ${total}`;

        pagCtrls.innerHTML = '';
        const mkBtn = (label, val, disabled, isActive) => {
            const b = document.createElement('button');
            b.className = 'pag-btn' + (isActive ? ' active' : '');
            b.innerHTML = label; b.disabled = disabled;
            if(!disabled) b.addEventListener('click', () => { currentPage = val; renderRows(); });
            return b;
        };
        pagCtrls.appendChild(mkBtn('&laquo;',1,currentPage===1,false));
        pagCtrls.appendChild(mkBtn('&lsaquo;',currentPage-1,currentPage===1,false));
        for(let p=Math.max(1,currentPage-1);p<=Math.min(totalPages,currentPage+1);p++)
            pagCtrls.appendChild(mkBtn(p,p,false,p===currentPage));
        pagCtrls.appendChild(mkBtn('&rsaquo;',currentPage+1,currentPage===totalPages,false));
        pagCtrls.appendChild(mkBtn('&raquo;',totalPages,currentPage===totalPages,false));

        if(slice.length === 0){
            const tr = document.createElement('tr'); tr.className = 'no-data-row';
            const td = document.createElement('td'); td.colSpan = columns.length+1; td.textContent = 'No records found.';
            tr.appendChild(td); tbody.appendChild(tr); return;
        }

        slice.forEach((row, idx) => {
            const tr = document.createElement('tr');
            tr.className = (start+idx)%2===1 ? 'row-even' : '';
            columns.forEach(col => {
                const td = document.createElement('td');
                td.innerHTML = col.render ? col.render(row[col.accessor], row) : (row[col.accessor] ?? '');
                tr.appendChild(td);
            });
            const tdAct = document.createElement('td');
            tdAct.style.textAlign = 'right';
            const actWrap = document.createElement('div');
            actWrap.className = 'td-actions'; actWrap.style.justifyContent = 'flex-end';
            if(onEdit){ const b = document.createElement('button'); b.className='btn btn-sm'; b.textContent='Edit'; b.addEventListener('click',()=>onEdit(row)); actWrap.appendChild(b); }
            if(onDelete){ const b = document.createElement('button'); b.className='btn btn-sm btn-danger'; b.textContent='Delete'; b.addEventListener('click',()=>onDelete(row)); actWrap.appendChild(b); }
            tdAct.appendChild(actWrap); tr.appendChild(tdAct); tbody.appendChild(tr);
        });
    }

    function sortAndRender(){
        if(sortKey){
            currentData.sort((a,b)=>{
                const va=(a[sortKey]??'').toString(), vb=(b[sortKey]??'').toString();
                if(!isNaN(va)&&!isNaN(vb)) return sortDir==='asc'?Number(va)-Number(vb):Number(vb)-Number(va);
                return sortDir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
            });
        }
        renderRows();
    }

    searchWrap.querySelector('input').addEventListener('input', e => {
        const q = e.target.value.trim().toLowerCase();
        currentData = q ? rows.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q)) : [...rows];
        currentPage = 1; sortAndRender();
    });

    sortAndRender();
}

function renderNoWedding(container){
    container.innerHTML = `
    <div class="card" style="text-align:center;padding:48px 32px;">

}

function openCreateWeddingModal(){
    showModal('Create Your Wedding',
        `<div class="form-grid">
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">Wedding Date</label>
                <input id="wDate" type="date"/>
            </div>
            <div class="form-group">
                <label class="form-label">Budget ($)</label>
                <input id="wBudget" type="number" placeholder="15000"/>
            </div>
            <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">Notes / Theme</label>
                <textarea id="wNotes" rows="3" placeholder="Summer garden theme..."></textarea>
            </div>
        </div>`,
        async () => {
            const date = document.getElementById('wDate').value;
            if(!date){ showToast('Please select a wedding date.','danger'); return; }
            const res = await api('POST','/api/weddings',{
                date,
                budget: document.getElementById('wBudget').value || null,
                notes:  document.getElementById('wNotes').value || null
            });
            if(res && res.ok){
                CURRENT_WEDDING = await res.json();
                closeModal();
                showToast('Wedding created! 🎉','success');
                await reload();
            } else {
                showToast('Could not create wedding.','danger');
            }
        }
    );
}

function renderSeatingBoard(wrap, eventId){
    const board = wrap.querySelector('#seatingBoard');
    if(!eventId){ board.innerHTML = '<p class="muted">Select an event above to see the seating layout.</p>'; return; }

    const eventAtt = ATTENDANCE.filter(a => String(a.event_id) === String(eventId));
    const assigned = eventAtt.filter(a => a.table_number);
    const unassigned = eventAtt.filter(a => !a.table_number);

    // Group by table
    const tables = {};
    assigned.forEach(a => {
        if(!tables[a.table_number]) tables[a.table_number] = [];
        tables[a.table_number].push(a);
    });

    const tableNums = Object.keys(tables).map(Number).sort((a,b)=>a-b);

    let html = '';

    if(tableNums.length === 0 && unassigned.length === 0){
        html = '<p class="muted">No guests assigned to this event yet. Click "+ Assign Guest" to start.</p>';
    } else {
        if(tableNums.length > 0){
            html += `<h4 style="font-family:'Cormorant Garamond',serif;font-size:17px;margin-bottom:12px;color:var(--text-dark);">Seating Layout</h4>
            <div class="seating-grid">
            ${tableNums.map(tnum => `
                <div class="table-card-seat">
                    <div class="table-title">🍽 Table ${tnum} <span style="font-size:12px;font-weight:400;color:var(--text-light);">(${tables[tnum].length} guests)</span></div>
                    ${tables[tnum].map(a=>`
                        <div class="seat-guest">
                            <span>${a.first_name} ${a.last_name}</span>
                            <span class="seat-role">${a.role}</span>
                        </div>`).join('')}
                </div>`).join('')}
            </div>`;
        }
        if(unassigned.length > 0){
            html += `<h4 style="font-family:'Cormorant Garamond',serif;font-size:17px;margin:20px 0 10px;color:var(--amber);">⚠ Unassigned Guests (${unassigned.length})</h4>
            <div class="unassigned-list">
            ${unassigned.map(a=>`
                <div class="unassigned-item">
                    <span>${a.first_name} ${a.last_name} <span style="color:var(--text-light);font-size:12px;">(${a.role})</span></span>
                    <button class="btn btn-sm btn-gold" onclick="openEditSeatModal(${a.attendance_id})">Assign Table</button>
                </div>`).join('')}
            </div>`;
        }
    }

    board.innerHTML = html;
}

function renderSettingsPage(container){
    const u = CURRENT_USER;
    const wrap = document.createElement('div');
    wrap.innerHTML = `
    <div class="card">
        <div class="card-header"><h3>Profile Settings</h3><span class="badge badge-rose">User #${u.user_id}</span></div>
        <div class="gold-rule"></div>
        <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:16px;background:var(--cream);border-radius:var(--radius-lg);border:1px solid var(--border-light);">
            <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blush-mid),var(--rose));display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:20px;flex-shrink:0;">
                ${u.first_name[0]}${u.last_name[0]}
            </div>
            <div>
                <div style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;">${u.first_name} ${u.last_name}</div>
                <div class="muted">${u.email}</div>
            </div>
        </div>
        <div class="form-grid">
            <div class="form-group"><label class="form-label">First Name</label><input id="sFirst" value="${u.first_name}"/></div>
            <div class="form-group"><label class="form-label">Last Name</label><input id="sLast" value="${u.last_name}"/></div>
            <div class="form-group"><label class="form-label">Email</label><input id="sEmail" type="email" value="${u.email}"/></div>
            <div class="form-group"><label class="form-label">Phone</label><input id="sPhone" value="${u.phone_number||''}"/></div>
            <div class="form-group"><label class="form-label">Gender</label>
                <select id="sGender">
                    <option ${u.gender==='Female'?'selected':''}>Female</option>
                    <option ${u.gender==='Male'?'selected':''}>Male</option>
                    <option ${u.gender==='Other'?'selected':''}>Other</option>
                </select>
            </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;">
            <button class="btn btn-primary" id="btnSaveProfile">Save Changes</button>
            <button class="btn btn-ghost" onclick="renderApp()">Reset</button>
        </div>
    </div>`;
    container.appendChild(wrap);

    wrap.querySelector('#btnSaveProfile').addEventListener('click', async () => {
        const res = await api('PUT',`/api/users/${u.user_id}`,{
            first_name: document.getElementById('sFirst').value,
            last_name: document.getElementById('sLast').value,
            email: document.getElementById('sEmail').value,
            phone_number: document.getElementById('sPhone').value,
            gender: document.getElementById('sGender').value
        });
        if(res && res.ok){
            CURRENT_USER = await res.json();
            document.getElementById('userName').textContent = `${CURRENT_USER.first_name} ${CURRENT_USER.last_name}`;
            document.getElementById('userAvatar').textContent = `${CURRENT_USER.first_name[0]}${CURRENT_USER.last_name[0]}`;
            showToast('Profile saved!','success');
        } else showToast('Error saving profile.','danger');
    });
}
